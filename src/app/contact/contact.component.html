<main id="main">

  <!-- Breadcrumbs -->
  <section id="breadcrumbs" class="breadcrumbs">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h2>Contact</h2>
        <ol>
          <li><a href="/">Home</a></li>
          <li>Contact</li>
        </ol>
      </div>
    </div>
  </section>

  <!-- Contact Section -->
  <section id="contact-us" class="contact-us">
    <div class="container">

      <!-- Map -->
      <div class="row">
        <div class="col-12">
          <div class="map-container mb-5">
            <iframe
              src="https://www.google.com/maps/embed?pb=!4v1780938132917!6m8!1m7!1s-sQ8dncX3aYPUyKaFX5WRQ!2m2!1d9.393641848071773!2d76.63838600123876!3f313.3948561485034!4f0!5f0.7820865974627469"
              allowfullscreen
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>
      </div>

      <!-- Contact Info + Image -->
      <div class="row align-items-stretch">

        <!-- Left -->
        <div class="col-lg-4 mb-4 mb-lg-0">
          <div class="info h-100">

            <div class="address mb-4">
              <i class="fa fa-map-marker"></i>
              <h4>Location</h4>
              <p>Puramattom P.O, 689 543</p>
            </div>

            <div class="email mb-4">
              <i class="fa fa-envelope"></i>
              <h4>Email</h4>
              <p>peralummoottil100@gmail.com</p>
            </div>

            <div class="text-center mt-4">
              <button
                (click)="naviagateTo('/office-bearers')"
                type="button"
                class="btn btn-office-bearers">
                Contact Office Bearers
              </button>
            </div>

          </div>
        </div>

        <!-- Right -->
        <div class="col-lg-8">
          <img
            src="assets/img/slide/slide-3-1.jpg"
            alt="Headquarters"
            class="img-fluid headquarters w-100">
        </div>

      </div>

    </div>
  </section>

</main>
